name: Gradle Build
run-name: Gradle Build ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: 'Create Github Release'
        type: boolean
        default: true

env:
  JAVA_VERSION: 21

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref_type != 'tag' && github.ref_name != github.event.repository.default_branch }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Stonecutter versions
        id: gradle_build
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t STONECUTTER_NODES < <(
            awk -F'"' '/^[[:space:]]*version\("/ { print $2 }' settings.gradle.kts
          )

          if [[ ${#STONECUTTER_NODES[@]} -eq 0 ]]; then
            echo "No Stonecutter versions found in settings.gradle.kts" >&2
            exit 1
          fi

          GRADLE_TASKS=()
          for node in "${STONECUTTER_NODES[@]}"; do
            GRADLE_TASKS+=(":${node}:build")
          done

          ./gradlew --build-cache "${GRADLE_TASKS[@]}"

          RELEASE_DIR="$PWD/build/release-artifacts"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          ARTIFACT_PATHS=()
          for node in "${STONECUTTER_NODES[@]}"; do
            mapfile -t node_jars < <(
              find "$PWD/versions/$node/build/libs" -maxdepth 1 -type f -name 'torchmaster-*.jar' \
                ! -name '*-sources.jar' \
                ! -name '*-dev.jar' \
                | sort
            )

            if [[ ${#node_jars[@]} -ne 1 ]]; then
              echo "Expected exactly one release jar for $node, found ${#node_jars[@]}" >&2
              printf '%s\n' "${node_jars[@]}" >&2
              exit 1
            fi

            cp "${node_jars[0]}" "$RELEASE_DIR/"
          done

          mapfile -t ARTIFACT_PATHS < <(find "$RELEASE_DIR" -maxdepth 1 -type f -name '*.jar' | sort)
          if [[ ${#ARTIFACT_PATHS[@]} -ne ${#STONECUTTER_NODES[@]} ]]; then
            echo "Expected ${#STONECUTTER_NODES[@]} release artifacts, found ${#ARTIFACT_PATHS[@]}" >&2
            printf '%s\n' "${ARTIFACT_PATHS[@]}" >&2
            exit 1
          fi

          ARTIFACTS=$(IFS=,; echo "${ARTIFACT_PATHS[*]}")
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            RELEASE_VERSION=$(awk -F= '/^version=/ { print $2; exit }' gradle.properties)
          fi

          if [[ "$RELEASE_VERSION" == *-alpha ]]; then
            RELEASE_TYPE=alpha
          elif [[ "$RELEASE_VERSION" == *-beta ]]; then
            RELEASE_TYPE=beta
          else
            RELEASE_TYPE=release
          fi

          jq -n \
            --arg release_version "$RELEASE_VERSION" \
            --arg release_type "$RELEASE_TYPE" \
            --argjson artifact_count "${#ARTIFACT_PATHS[@]}" \
            --argjson artifacts "$(printf '%s\n' "${ARTIFACT_PATHS[@]}" | jq -R . | jq -s .)" \
            '{release_version: $release_version, release_type: $release_type, artifact_count: $artifact_count, artifacts: $artifacts}' \
            > release-info.json

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "artifact_count=${#ARTIFACT_PATHS[@]}" >> "$GITHUB_OUTPUT"
          echo "artifact_paths=$ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: torchmaster-jars
          path: build/release-artifacts/*.jar
          if-no-files-found: error

      - name: Create Github Release
        id: create_github_release
        if: ${{ !cancelled() && steps.gradle_build.outcome == 'success' && github.event.inputs.create_github_release == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          name: "Torchmaster ${{ steps.gradle_build.outputs.release_version }}"
          bodyFile: "CHANGELOG.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "${{ steps.gradle_build.outputs.artifact_paths }}"
          tag: "${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.gradle_build.outputs.release_version) }}"
